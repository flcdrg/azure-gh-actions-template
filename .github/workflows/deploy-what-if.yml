name: Deployment What-If (PR Validation)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-what-if.yml'

env:
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP_NAME: ${{ secrets.RESOURCE_GROUP_NAME }}
  DEPLOYMENT_NAME: 'deployment-pr-validation'
  ENVIRONMENT: 'dev'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup Deployment Variables
    runs-on: ubuntu-latest
    outputs:
      deployment-name: ${{ steps.deployment-name.outputs.name }}
    steps:
      - name: Generate deployment name with timestamp
        id: deployment-name
        run: |
          DEPLOYMENT_NAME="${{ env.DEPLOYMENT_NAME }}-$(date +%s)"
          echo "name=${DEPLOYMENT_NAME}" >> $GITHUB_OUTPUT

  validate-bicep:
    name: Validate Bicep Template
    runs-on: ubuntu-latest
    outputs:
      bicep-validation: ${{ steps.validate.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Bicep syntax
        id: validate
        run: |
          az bicep build --file infra/main.bicep --outdir /tmp
          echo "✓ Bicep syntax is valid"

      - name: Check parameter file
        run: |
          if [ -f "infra/main.bicepparam" ]; then
            echo "✓ Parameter file found: infra/main.bicepparam"
          else
            echo "✗ Parameter file not found: infra/main.bicepparam"
            exit 1
          fi

  what-if:
    name: Deployment What-If Preview
    needs: [validate-bicep, setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Run deployment what-if
        uses: Azure/bicep-deploy@v2
        with:
          name: ${{ needs.setup.outputs.deployment-name }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ env.RESOURCE_GROUP_NAME }}
          scope: resourceGroup
          template-file: ./infra/main.bicep
          parameters-file: ./infra/main.bicepparam
          type: deployment
          operation: what-if

      - name: Format what-if output for PR comment
        id: format-output
        run: |
          echo "## 🔍 Deployment What-If Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ env.ENVIRONMENT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** \`${{ env.RESOURCE_GROUP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Name:** \`${{ needs.setup.outputs.deployment-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Status:" >> $GITHUB_STEP_SUMMARY
          echo "✓ Template validation completed successfully" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with validation results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = process.env.GITHUB_STEP_SUMMARY;
            const jobSummary = fs.readFileSync(summary, 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: jobSummary
            });

  summary:
    name: Summary
    needs: [validate-bicep, what-if]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check validation status
        run: |
          if [ "${{ needs.validate-bicep.outcome }}" != "success" ] || [ "${{ needs.what-if.outcome }}" != "success" ]; then
            echo "❌ PR validation failed"
            exit 1
          else
            echo "✓ PR validation successful"
          fi
