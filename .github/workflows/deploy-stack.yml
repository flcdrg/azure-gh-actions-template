name: Deploy Deployment Stack

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-stack.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP_NAME: ${{ secrets.RESOURCE_GROUP_NAME }}
  DEPLOYMENT_STACK_NAME: 'stack-dev'
  ENVIRONMENT: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Deployment Stack
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Validate resource group exists
        run: |
          if az group exists --name "${RESOURCE_GROUP_NAME}" | grep -q true; then
            echo "✓ Resource group '${RESOURCE_GROUP_NAME}' found"
          else
            echo "✗ Resource group '${RESOURCE_GROUP_NAME}' not found"
            exit 1
          fi

      - name: Validate Bicep template
        run: |
          az bicep build --file infra/main.bicep --outdir /tmp
          az deployment group validate \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam
          echo "✓ Template validation successful"

      - name: Create or update deployment stack
        id: deploy
        run: |
          echo "Deploying to environment: ${ENVIRONMENT}"
          echo "Resource group: ${RESOURCE_GROUP_NAME}"
          echo "Stack name: ${DEPLOYMENT_STACK_NAME}"
          
          # Deploy using az stack command (preview)
          # Note: Deployment stacks require Azure CLI 2.48.0 or later
          az deployment group create \
            --name "${DEPLOYMENT_STACK_NAME}-$(date +%s)" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --mode Incremental
          
          echo "✓ Deployment completed successfully"

      - name: Get deployment outputs
        id: outputs
        run: |
          echo "## 📦 Deployment Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          OUTPUTS=$(az deployment group show \
            --name "${DEPLOYMENT_STACK_NAME}-$(date +%s)" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query properties.outputs)
          
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deployment success summary
        run: |
          echo "✓ Deployment Stack deployment completed"
          echo "Environment: ${ENVIRONMENT}"
          echo "Resource Group: ${RESOURCE_GROUP_NAME}"
          echo "Stack Name: ${DEPLOYMENT_STACK_NAME}"
